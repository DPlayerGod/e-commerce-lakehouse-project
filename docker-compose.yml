version: '3.8'

x-airflow-common-env: &airflow-common-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
  AIRFLOW__API_AUTH__JWT_SECRET: ecom-airflow-jwt-secret-dev
  AIRFLOW__API__SECRET_KEY: ecom-airflow-api-secret-dev
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "false"
  AIRFLOW__CORE__UNIT_TEST_MODE: "true"
  AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: "UTC"
  AIRFLOW__WEBSERVER__DEFAULT_LANGUAGE: "en"
  _PIP_ADDITIONAL_REQUIREMENTS: ''
  CLICKHOUSE_USER: ${CLICKHOUSE_USER}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
  CLICKHOUSE_DB: ${CLICKHOUSE_DB}

services:
  # PostgreSQL - Reference data store + Airflow metadata DB
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infra/postgres/airflow-init.sql:/docker-entrypoint-initdb.d/02-airflow.sql
      - ./infra/postgres/superset-init.sql:/docker-entrypoint-initdb.d/03-superset.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka - Event streaming platform (KRaft Mode)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce-kafka
    environment:
      CLUSTER_ID: MkQwODI4NTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092,CONTROLLER://kafka:29093
    ports:
      - "9092:9092"
      - "29092:29092"
      - "29093:29093"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 | grep ApiVersion" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Schema Registry - Schema storage and management
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: ecommerce-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_DEBUG: "true"
    ports:
      - "8081:8081"
    healthcheck:
      test: [ "CMD", "curl", "-i", "http://localhost:8081/subjects" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Debezium - PostgreSQL CDC to Kafka
  debezium:
    build:
      context: ./infra/debezium
    container_name: ecommerce-debezium
    depends_on:
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: ecommerce.connect.configs
      OFFSET_STORAGE_TOPIC: ecommerce.connect.offsets
      STATUS_STORAGE_TOPIC: ecommerce.connect.statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      DEBEZIUM_CONNECT_WAIT_ATTEMPTS: 60
      DEBEZIUM_CONNECT_WAIT_INTERVAL: 5
    volumes:
      - ./infra/debezium/config:/kafka/connectors
    ports:
      - "8083:8083"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/connectors" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Optional: Kafka UI for debugging
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.0
    container_name: ecommerce-kafka-ui
    depends_on:
      - kafka
      - schema-registry
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    ports:
      - "8080:8080"

  # MinIO/S3 - Data Lake Storage
  minio:
    image: minio/minio:latest
    container_name: ecommerce-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION: ap-southeast-1
      MINIO_REGION_NAME: ap-southeast-1
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ClickHouse - Analytical Data Store (Target for Gold Marts)
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: ecommerce-clickhouse
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    volumes:
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infra/clickhouse/users.d:/etc/clickhouse-server/users.d
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # Data Generator - Mock Transaction Data
  data-generator:
    build:
      context: ./infra/data-generator
    container_name: ecommerce-data-generator
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PG_DSN: host=postgres port=5432 dbname=demo user=admin password=admin
      TARGET_EPS: 120
      SEED_USERS: 500
      SEED_PRODUCTS: 200
      TOPIC_ORDERS: orders.v1
      TOPIC_PAYMENTS: payments.v1
      TOPIC_SHIPMENTS: shipments.v1
      TOPIC_DELIVERIES: delivery-status.v1
      CDC_TOPIC_USERS: demo.public.users
      CDC_TOPIC_PRODUCTS: demo.public.products
      P_ORDER_HAS_PAYMENT: 0.7
      P_ORDER_HAS_SHIPMENT: 0.6
      P_BAD_RECORD: 0.01
      P_UPDATE_USER_INFO: 0.0008
      P_UPDATE_PRODUCT_PRICE: 0.0005
      P_LATE_EVENT: 0.05
      MAX_LATE_MINUTES: 25
      P_SHIPMENT_HAS_DELIVERY: 1.0
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import psycopg2, os; from confluent_kafka.schema_registry import SchemaRegistryClient; pg_dsn = os.getenv('PG_DSN'); sr_url = os.getenv('SCHEMA_REGISTRY_URL'); conn = psycopg2.connect(pg_dsn); conn.close(); sr = SchemaRegistryClient({'url': sr_url}); sr.get_subjects()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # Spark Standalone Master
  spark-master:
    build:
      context: ./infra/spark-services
    container_name: ecommerce-spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    ports:
      - "7077:7077"
      - "8088:8080"
    volumes:
      - ./infra/spark-services:/opt/spark-services
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    profiles: [ "spark-ingest" ]

  # Spark Standalone Worker
  spark-worker-1:
    build:
      context: ./infra/spark-services
    container_name: ecommerce-spark-worker-1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    ports:
      - "8091:8081"
    volumes:
      - ./infra/spark-services:/opt/spark-services
    depends_on:
      spark-master:
        condition: service_healthy
    profiles: [ "spark-ingest" ]

  # Spark Job Ingest - Kafka to Iceberg Bronze
  spark-job-ingest:
    build:
      context: ./infra/spark-services
    container_name: ecommerce-spark-job-ingest
    profiles: [ "spark-ingest" ]
    environment:
      AWS_REGION: ap-southeast-1
      AWS_DEFAULT_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      spark-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./infra/spark-services:/opt/spark-services
    command: >
      spark-submit --master spark://spark-master:7077 --deploy-mode client --conf spark.driverEnv.AWS_REGION=ap-southeast-1 --conf spark.driverEnv.AWS_DEFAULT_REGION=ap-southeast-1 --conf spark.driverEnv.AWS_ACCESS_KEY_ID=minioadmin --conf spark.driverEnv.AWS_SECRET_ACCESS_KEY=minioadmin --conf spark.executorEnv.AWS_REGION=ap-southeast-1 --conf spark.executorEnv.AWS_DEFAULT_REGION=ap-southeast-1 --conf spark.executorEnv.AWS_ACCESS_KEY_ID=minioadmin --conf spark.executorEnv.AWS_SECRET_ACCESS_KEY=minioadmin /opt/spark-services/jobs/bronze_ingestion.py --topics orders.v1,payments.v1,shipments.v1,delivery-status.v1,demo.public.users,demo.public.products --starting-offsets earliest --trigger-seconds 10 --max-offsets-per-trigger 5000
    restart: unless-stopped

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: ./infra/airflow
      dockerfile: Dockerfile
    container_name: ecommerce-airflow-scheduler
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/spark-services:/opt/spark-services
      - ./infra/airflow/processing/spark/jobs:/opt/spark-services/jobs
    entrypoint: /entrypoint.sh
    command: airflow scheduler
    profiles: [ "airflow" ]
    restart: always

  # Airflow API Server (Webserver in Airflow 3.x)
  airflow-webserver:
    build:
      context: ./infra/airflow
      dockerfile: Dockerfile
    container_name: ecommerce-airflow-webserver
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
      airflow-scheduler:
        condition: service_started
    ports:
      - "8085:8080"
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/spark-services:/opt/spark-services
      - ./infra/airflow/processing/spark/jobs:/opt/spark-services/jobs
    entrypoint: /entrypoint.sh
    command: airflow api-server
    profiles: [ "airflow" ]
    restart: always

  # Airflow DAG Processor (Required for Airflow 3.x)
  airflow-dag-processor:
    build:
      context: ./infra/airflow
      dockerfile: Dockerfile
    container_name: ecommerce-airflow-dag-processor
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/spark-services:/opt/spark-services
      - ./infra/airflow/processing/spark/jobs:/opt/spark-services/jobs
    entrypoint: /entrypoint.sh
    command: airflow dag-processor
    profiles: [ "airflow" ]
    restart: always

  # Superset - BI Platform
  superset:
    image: apache/superset:4.0.1
    container_name: ecommerce-superset
    environment:
      SUPERSET_SECRET_KEY: "ecommerce-secret-dev-2026"
      SQLALCHEMY_DATABASE_URI: postgresql://admin:admin@postgres:5432/superset
      PYTHONPATH: /app/pythonpath
    volumes:
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py
    ports:
      - "8089:8088"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - default
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      bash -c "pip install clickhouse-connect && superset run --host 0.0.0.0 --port 8088 --with-threads --reload --debugger"

  # Superset Init - One-time setup
  superset-init:
    image: apache/superset:4.0.1
    container_name: ecommerce-superset-init
    command: >
      bash -c " pip install clickhouse-connect && superset db upgrade && superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin && superset init "
    environment:
      SUPERSET_SECRET_KEY: "ecommerce-secret-dev-2026"
      SQLALCHEMY_DATABASE_URI: postgresql://admin:admin@postgres:5432/superset
      PYTHONPATH: /app/pythonpath
    volumes:
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py
    depends_on:
      superset:
        condition: service_healthy
    networks:
      - default

volumes:
  postgres_data:
  minio_data:
  clickhouse_data:


networks:
  default:
    name: ecommerce-network
